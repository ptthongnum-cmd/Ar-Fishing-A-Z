<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Fishing Game P.1</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-marker preset="hiro">
        <a-text value="A" position="0 1 0" scale="5 5 5" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.6" ry="0.4" color="#FF4500" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#FF4500" vertex-a="-0.6 0.2 0" vertex-b="-0.6 -0.2 0" vertex-c="-1.0 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <a-marker preset="kanji">
        <a-text value="B" position="0 1 0" scale="5 5 5" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.6" ry="0.4" color="#1E90FF" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#1E90FF" vertex-a="-0.6 0.2 0" vertex-b="-0.6 -0.2 0" vertex-c="-1.0 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
