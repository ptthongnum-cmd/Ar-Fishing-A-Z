<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Fishing Game for Prathom 1</title>
    <!-- ดึงไลบรารีสำหรับทำ AR บนเว็บ -->
    <script src="https://aframe.io/releases/1.3.0/Aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- =================================================== -->
      <!-- ปลาตัวที่ 1: ปลาสีแดง ตัวอักษร A -->
      <!-- =================================================== -->
      <!-- สแกนด้วย Marker "Hiro" (สัญลักษณ์มาตรฐานของ AR.js) -->
      <a-marker preset="hiro">
        <!-- ตัวอักษร A 3 มิติ สีทองลอยขึ้นมา -->
        <a-text value="A" position="-0.3 1.5 0" scale="4 4 4" color="#FFD700" align="center"></a-text>
        <!-- วัตถุ 3 มิติทรงกลม/ทรงรี สมมติว่าเป็นตัวปลาสีแดง -->
        <a-ellipse cx="0" cy="0" rx="0.8" ry="0.5" color="#FF4500" position="0 0.5 0" rotation="-90 0 0"></a-ellipse>
        <!-- หางปลา -->
        <a-triangle color="#FF4500" vertex-a="-0.8 0.3 0" vertex-b="-0.8 -0.3 0" vertex-c="-1.3 0 0" position="0 0.5 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- =================================================== -->
      <!-- ปลาตัวที่ 2: ปลาสีน้ำเงิน ตัวอักษร B -->
      <!-- =================================================== -->
      <!-- สแกนด้วย Marker "Kanji" (สัญลักษณ์มาตรฐานตัวที่ 2) -->
      <a-marker preset="kanji">
        <!-- ตัวอักษร B 3 มิติ -->
        <a-text value="B" position="-0.3 1.5 0" scale="4 4 4" color="#FFD700" align="center"></a-text>
        <!-- ตัวปลาสีน้ำเงิน -->
        <a-ellipse cx="0" cy="0" rx="0.8" ry="0.5" color="#1E90FF" position="0 0.5 0" rotation="-90 0 0"></a-ellipse>
        <!-- หางปลา -->
        <a-triangle color="#1E90FF" vertex-a="-0.8 0.3 0" vertex-b="-0.8 -0.3 0" vertex-c="-1.3 0 0" position="0 0.5 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
