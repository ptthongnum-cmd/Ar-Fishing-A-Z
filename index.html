<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Fishing Game A-Z for P.1</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <!-- เปิดโหมดสแกนบาร์โค้ดแบบตัวเลข (Matrix) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <!-- ==================== GROUP 1: MARKER มาตรฐาน ==================== -->
      <!-- A: Hiro Marker (ปลาสีแดง) -->
      <a-marker preset="hiro">
        <a-text value="A" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#FF4500" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#FF4500" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- B: Kanji Marker (ปลาสีน้ำเงิน) -->
      <a-marker preset="kanji">
        <a-text value="B" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#1E90FF" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#1E90FF" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- ==================== GROUP 2: MATRIX MARKERS (บาร์โค้ดตัวเลข) ==================== -->
      <!-- สแกนด้วยแผ่นบาร์โค้ดหมายเลขนั้น ๆ -->
      
      <!-- C: Barcode 0 (ปลาสีเขียว) -->
      <a-marker type="barcode" value="0">
        <a-text value="C" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#32CD32" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#32CD32" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- D: Barcode 1 (ปลาสีส้ม) -->
      <a-marker type="barcode" value="1">
        <a-text value="D" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#FF8C00" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#FF8C00" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- E: Barcode 2 (ปลาสีชมพู) -->
      <a-marker type="barcode" value="2">
        <a-text value="E" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text>
        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#FF69B4" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>
        <a-triangle color="#FF69B4" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle>
      </a-marker>

      <!-- F: Barcode 3 (ปลาสีม่วง) -->

        <a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#9400D3" position="0 0.1 0" rotation="-90 0 0"></a-ellipse>

      <!-- P: Barcode 13 -->
      <a-marker type="barcode" value="13"><a-text value="P" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text><a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#FFD700" position="0 0.1 0" rotation="-90 0 0"></a-ellipse><a-triangle color="#FFD700" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle></a-marker>

      <!-- Q: Barcode 14 -->
      <a-marker type="barcode" value="14"><a-text value="Q" position="0 1 0" scale="6 6 6" color="#FFD700" align="center" rotation="-90 0 0"></a-text><a-ellipse cx="0" cy="0" rx="0.7" ry="0.45" color="#FF4500" position="0 0.1 0" rotation="-90 0 0"></a-ellipse><a-triangle color="#FF4500" vertex-a="-0.7 0.25 0" vertex-b="-0.7 -0.25 0" vertex-c="-1.1 0 0" position="0 0.1 0" rotation="-90 0 0"></a-triangle></a-marker>
